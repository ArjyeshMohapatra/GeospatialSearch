<app-auth-layout [title]="'Join Geospatial Search'">

    @if (errorMessage) {
    <div class="alert alert-danger py-2" role="alert">
        {{ errorMessage }}
    </div>
    }

    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
            <label for="email" class="form-label text-secondary small fw-medium">
                Email address
            </label>

            <input id="email" type="email" formControlName="email" class="form-control form-control-lg"
                placeholder="email" required>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label text-secondary small fw-medium">
                Password
            </label>

            <input id="password" type="password" formControlName="password" class="form-control form-control-lg"
                placeholder="password (min 8 char)" required>
        </div>

        <div class="d-grid mb-4">
            <button type="submit" [disabled]="signUpForm.invalid" class="btn btn-primary btn-lg">
                Create account
            </button>
        </div>

        <div class="text-center mt-3">
            <a routerLink="/signin" class="text-decoration-none small">
                Back to log in
            </a>
        </div>

    </form>

</app-auth-layout>
