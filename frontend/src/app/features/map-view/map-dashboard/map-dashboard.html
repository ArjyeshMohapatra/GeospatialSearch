<div class="position-relative vh-100 vw-100 overflow-hidden">

    <div id="ola-map" class="w-100 h-100"></div>

    <div class="position-absolute top-0 start-0 m-4 shadow-lg bg-white rounded p-3"
        style="width: 350px; z-index: 1000;">
        <h5 class="mb-3">Search Area</h5>

        <form [formGroup]="searchForm" (ngSubmit)="onSearch()">

            <div class="mb-3">
                <label for="poiType" class="form-label fw-bold mb-1">What are you looking for?</label>
                <input type="text" class="form-control" id="poiType" formControlName="poiType"
                    placeholder="e.g., Coffee, ATM, Skate Park...">
            </div>

            <div class="mb-4">
                <label for="radius" class="form-label text-muted small mb-1">
                    Search Radius: {{ searchForm.get('radius')?.value }} meters
                </label>
                <input type="range" class="form-range" id="radius" min="500" max="5000" step="100"
                    formControlName="radius">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-2" [disabled]="searchForm.invalid">
                Search Area
            </button>

            <button type="button" class="btn btn-outline-danger w-100 btn-sm mt-2" (click)="authService.logout()">
                Logout
            </button>

        </form>
    </div>
    </div>
