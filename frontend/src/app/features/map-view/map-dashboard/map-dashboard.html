<div class="gm-map-shell position-relative overflow-hidden">
    <div id="ola-map" class="gm-map"></div>

    <div class="gm-panel position-absolute top-0 start-0">
        <div class="gm-panel-header">
            <div class="gm-panel-icon">
                <svg class="gm-panel-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 21s-6-5.3-6-10a6 6 0 0 1 12 0c0 4.7-6 10-6 10Z"></path>
                    <circle cx="12" cy="11" r="2.5"></circle>
                </svg>
            </div>
            <div>
                <p class="gm-panel-title">Search this area</p>
                <p class="gm-panel-subtitle">Drop a pin to set the center</p>
            </div>
        </div>

        <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
            <div class="mb-3">
                <label for="poiType" class="form-label gm-label mb-1">What are you looking for?</label>
                <input type="text" class="form-control" id="poiType" formControlName="poiType"
                    placeholder="Coffee, ATM, skate park">
            </div>

            <div class="mb-4">
                <label for="radius" class="form-label gm-range-label mb-1">
                    Search radius: {{ searchForm.get('radius')?.value }} meters
                </label>
                <input type="range" class="form-range" id="radius" min="500" max="5000" step="100"
                    formControlName="radius">
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-2 gm-primary" [disabled]="searchForm.invalid">
                Search area
            </button>

            <button type="button" class="btn btn-light w-100 btn-sm gm-ghost" (click)="authService.logout()">
                Logout
            </button>
        </form>
    </div>
</div>
